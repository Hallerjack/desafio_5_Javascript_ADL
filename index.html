<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 5 - Todo List</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <header>
        <h1>Todo List</h1>
        <hr>
    </header>
    <main>
        <h3>Nueva tarea</h3>
        <div class="tarea-container">
            <input type="text" id="nueva-tarea">
            <button id="agregar-tarea">Agregar</button>
        </div>
    </main>
    <section class="data-container">
        <div class="resumen">
            <span id="cuenta-tareas"></span>
            <span id="cuenta-tareas-realizadas"></span>
        </div>
        <div class="tareas">
            <table>
                <thead>
                    <th>ID</th>
                    <th>Tarea</th>
                    <th></th>
                    <th></th>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </section>
    <script src="./assets/js/script.js"></script>
</body>
</html>
